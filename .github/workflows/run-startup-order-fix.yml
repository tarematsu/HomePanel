name: Run Stationhead startup order fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/fix-stationhead-startup-order'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Run focused patch
        id: patch
        shell: bash
        run: |
          awk '
            /python3 - <<'\''PY'\''/ { capture=1; next }
            capture && /^          PY$/ { exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-startup-order-fix.yml > /tmp/apply-startup-order-fix.py
          set +e
          python3 /tmp/apply-startup-order-fix.py > /tmp/startup-patch.log 2>&1
          status=$?
          set -e
          cat /tmp/startup-patch.log
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          rm .github/workflows/run-startup-order-fix.yml
          git diff --check

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: startup-patch-diagnostics
          path: |
            /tmp/startup-patch.log
            /tmp/apply-startup-order-fix.py

      - name: Commit source fix
        if: steps.patch.outcome == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/src/app.cpp native/src/app_messages.cpp \
            .github/workflows/apply-startup-order-fix.yml \
            .github/workflows/run-startup-order-fix.yml
          git commit -m "Fix Stationhead-first native startup order"
          git push origin HEAD:${{ github.head_ref }}
