name: Strip documentation and comments

on:
  push:
    branches:
      - agent/remove-documentation-comments

permissions:
  contents: write

jobs:
  strip:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloud/package-lock.json

      - name: Install cloud dependencies
        working-directory: cloud
        run: npm ci --no-audit --no-fund

      - name: Remove TypeScript and JavaScript comments
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/strip-ts.cjs" <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const ts = require(path.resolve('cloud/node_modules/typescript'));

          const extensions = new Set(['.ts', '.tsx', '.js', '.jsx', '.mjs', '.cjs']);
          const ignored = new Set(['.git', 'node_modules', 'build', 'build-ci', 'dist', '.wrangler', 'packages']);

          function walk(directory) {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              if (ignored.has(entry.name)) continue;
              const fullPath = path.join(directory, entry.name);
              if (entry.isDirectory()) {
                walk(fullPath);
                continue;
              }
              if (!extensions.has(path.extname(entry.name).toLowerCase())) continue;
              stripFile(fullPath);
            }
          }

          function stripFile(filePath) {
            const source = fs.readFileSync(filePath, 'utf8');
            const extension = path.extname(filePath).toLowerCase();
            const variant = extension === '.tsx' || extension === '.jsx'
              ? ts.LanguageVariant.JSX
              : ts.LanguageVariant.Standard;
            const scanner = ts.createScanner(ts.ScriptTarget.Latest, false, variant, source);
            const ranges = [];
            for (;;) {
              const kind = scanner.scan();
              if (kind === ts.SyntaxKind.EndOfFileToken) break;
              if (kind === ts.SyntaxKind.SingleLineCommentTrivia || kind === ts.SyntaxKind.MultiLineCommentTrivia) {
                ranges.push([scanner.getTokenPos(), scanner.getTextPos(), kind]);
              }
            }
            if (!ranges.length) return;
            let output = source;
            for (let index = ranges.length - 1; index >= 0; index -= 1) {
              const [start, end, kind] = ranges[index];
              const token = source.slice(start, end);
              const replacement = kind === ts.SyntaxKind.MultiLineCommentTrivia
                ? token.replace(/[^\n]/g, '').replace(/^$/, ' ')
                : '';
              output = output.slice(0, start) + replacement + output.slice(end);
            }
            if (output !== source) fs.writeFileSync(filePath, output, 'utf8');
          }

          walk(process.cwd());
          NODE
          node "$RUNNER_TEMP/strip-ts.cjs"

      - name: Remove documents and other comments
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/strip-repo.py" <<'PY'
          from __future__ import annotations

          import io
          import re
          import shutil
          import tokenize
          from pathlib import Path

          ROOT = Path.cwd()
          IGNORED_DIRS = {
              ".git", "node_modules", "build", "build-ci", "dist", ".wrangler",
              "packages", "coverage", ".cache", "ci-logs",
          }
          DOCUMENT_DIRS = {"doc", "docs", "documentation"}
          DOCUMENT_EXTENSIONS = {".md", ".mdx", ".rst", ".adoc", ".asciidoc"}
          DOCUMENT_PREFIXES = (
              "readme", "changelog", "contributing", "code_of_conduct",
              "code-of-conduct", "security", "support", "authors",
          )
          C_LIKE_EXTENSIONS = {
              ".c", ".cc", ".cpp", ".cxx", ".h", ".hh", ".hpp", ".hxx",
              ".cs", ".java", ".kt", ".kts", ".swift", ".go", ".rs",
              ".css", ".scss", ".sass", ".less",
          }
          HASH_EXTENSIONS = {
              ".yml", ".yaml", ".toml", ".ini", ".cfg", ".conf", ".sh",
              ".bash", ".zsh", ".fish", ".ps1", ".psm1", ".cmake",
              ".properties",
          }
          HASH_NAMES = {
              "cmakelists.txt", "makefile", "gnumakefile", ".gitignore",
              ".gitattributes", ".editorconfig", ".npmrc",
          }
          XML_EXTENSIONS = {".html", ".htm", ".xml", ".svg"}
          SQL_EXTENSIONS = {".sql"}
          PYTHON_EXTENSIONS = {".py", ".pyw"}
          BATCH_EXTENSIONS = {".bat", ".cmd"}

          def ignored(path: Path) -> bool:
              return any(part in IGNORED_DIRS for part in path.parts)

          def preserve_newlines(text: str) -> str:
              newlines = "".join(character for character in text if character in "\r\n")
              return newlines if newlines else " "

          def strip_c_like(source: str) -> str:
              output: list[str] = []
              index = 0
              length = len(source)
              quote: str | None = None
              raw_end: str | None = None
              while index < length:
                  if raw_end is not None:
                      end = source.find(raw_end, index)
                      if end < 0:
                          output.append(source[index:])
                          break
                      output.append(source[index:end + len(raw_end)])
                      index = end + len(raw_end)
                      raw_end = None
                      continue
                  if quote is not None:
                      character = source[index]
                      output.append(character)
                      index += 1
                      if character == "\\" and quote != "`" and index < length:
                          output.append(source[index])
                          index += 1
                      elif character == quote:
                          quote = None
                      continue
                  if source.startswith('R"', index):
                      delimiter_end = source.find("(", index + 2, min(length, index + 20))
                      if delimiter_end >= 0:
                          delimiter = source[index + 2:delimiter_end]
                          raw_end = ")" + delimiter + '"'
                          output.append(source[index:delimiter_end + 1])
                          index = delimiter_end + 1
                          continue
                  character = source[index]
                  if character in {"'", '"', "`"}:
                      quote = character
                      output.append(character)
                      index += 1
                      continue
                  if source.startswith("//", index):
                      end = source.find("\n", index + 2)
                      if end < 0:
                          break
                      output.append("\n")
                      index = end + 1
                      continue
                  if source.startswith("/*", index):
                      end = source.find("*/", index + 2)
                      if end < 0:
                          output.append(preserve_newlines(source[index:]))
                          break
                      output.append(preserve_newlines(source[index:end + 2]))
                      index = end + 2
                      continue
                  output.append(character)
                  index += 1
              return "".join(output)

          def strip_hash_comments(source: str) -> str:
              lines = source.splitlines(keepends=True)
              output: list[str] = []
              for line_number, line in enumerate(lines):
                  if line_number == 0 and line.startswith("#!"):
                      output.append(line)
                      continue
                  single = False
                  double = False
                  escaped = False
                  cut = None
                  for index, character in enumerate(line):
                      if escaped:
                          escaped = False
                          continue
                      if character == "\\" and double:
                          escaped = True
                          continue
                      if character == "'" and not double:
                          single = not single
                          continue
                      if character == '"' and not single:
                          double = not double
                          continue
                      if character == "#" and not single and not double and (index == 0 or line[index - 1].isspace()):
                          cut = index
                          break
                  if cut is None:
                      output.append(line)
                      continue
                  newline = "\r\n" if line.endswith("\r\n") else "\n" if line.endswith("\n") else ""
                  output.append(line[:cut].rstrip() + newline)
              return "".join(output)

          def strip_powershell_blocks(source: str) -> str:
              pattern = re.compile(r"<#.*?#>", re.DOTALL)
              return pattern.sub(lambda match: preserve_newlines(match.group(0)), source)

          def strip_sql(source: str) -> str:
              output: list[str] = []
              index = 0
              quote: str | None = None
              while index < len(source):
                  character = source[index]
                  if quote is not None:
                      output.append(character)
                      index += 1
                      if character == quote:
                          if index < len(source) and source[index] == quote:
                              output.append(source[index])
                              index += 1
                          else:
                              quote = None
                      continue
                  if character in {"'", '"'}:
                      quote = character
                      output.append(character)
                      index += 1
                      continue
                  if source.startswith("--", index):
                      end = source.find("\n", index + 2)
                      if end < 0:
                          break
                      output.append("\n")
                      index = end + 1
                      continue
                  if source.startswith("/*", index):
                      end = source.find("*/", index + 2)
                      if end < 0:
                          output.append(preserve_newlines(source[index:]))
                          break
                      output.append(preserve_newlines(source[index:end + 2]))
                      index = end + 2
                      continue
                  output.append(character)
                  index += 1
              return "".join(output)

          def strip_python(source: str) -> str:
              offsets = [0]
              for match in re.finditer(r".*?(?:\n|$)", source):
                  offsets.append(match.end())
              ranges: list[tuple[int, int]] = []
              try:
                  tokens = tokenize.generate_tokens(io.StringIO(source).readline)
                  for token in tokens:
                      if token.type != tokenize.COMMENT:
                          continue
                      if token.start == (1, 0) and token.string.startswith("#!"):
                          continue
                      start = offsets[token.start[0] - 1] + token.start[1]
                      end = offsets[token.end[0] - 1] + token.end[1]
                      ranges.append((start, end))
              except (tokenize.TokenError, IndentationError):
                  return source
              output = source
              for start, end in reversed(ranges):
                  output = output[:start] + output[end:]
              return output

          def strip_xml_and_embedded(source: str) -> str:
              source = re.sub(
                  r"<!--.*?-->",
                  lambda match: preserve_newlines(match.group(0)),
                  source,
                  flags=re.DOTALL,
              )
              source = re.sub(
                  r"(<style\b[^>]*>)(.*?)(</style>)",
                  lambda match: match.group(1) + strip_c_like(match.group(2)) + match.group(3),
                  source,
                  flags=re.IGNORECASE | re.DOTALL,
              )
              source = re.sub(
                  r"(<script\b[^>]*>)(.*?)(</script>)",
                  lambda match: match.group(1) + strip_c_like(match.group(2)) + match.group(3),
                  source,
                  flags=re.IGNORECASE | re.DOTALL,
              )
              return source

          def strip_batch(source: str) -> str:
              output: list[str] = []
              for line in source.splitlines(keepends=True):
                  stripped = line.lstrip()
                  lowered = stripped.lower()
                  if lowered.startswith("rem ") or lowered.startswith("rem\t") or stripped.startswith("::"):
                      newline = "\r\n" if line.endswith("\r\n") else "\n" if line.endswith("\n") else ""
                      output.append(newline)
                  else:
                      output.append(line)
              return "".join(output)

          def remove_documents() -> None:
              directories = sorted(
                  [path for path in ROOT.rglob("*") if path.is_dir() and not ignored(path) and path.name.lower() in DOCUMENT_DIRS],
                  key=lambda path: len(path.parts),
                  reverse=True,
              )
              for directory in directories:
                  if directory.exists():
                      shutil.rmtree(directory)
              for path in sorted(ROOT.rglob("*")):
                  if not path.is_file() or ignored(path):
                      continue
                  relative = path.relative_to(ROOT)
                  lowered = path.name.lower()
                  if relative.as_posix().startswith(".github/ISSUE_TEMPLATE/") or relative.as_posix().startswith(".github/PULL_REQUEST_TEMPLATE/"):
                      path.unlink()
                      continue
                  if path.suffix.lower() in DOCUMENT_EXTENSIONS or lowered.startswith(DOCUMENT_PREFIXES):
                      path.unlink()

          def process_file(path: Path) -> None:
              try:
                  source = path.read_text(encoding="utf-8")
              except (UnicodeDecodeError, OSError):
                  return
              extension = path.suffix.lower()
              name = path.name.lower()
              output = source
              if extension in C_LIKE_EXTENSIONS:
                  output = strip_c_like(source)
              elif extension in PYTHON_EXTENSIONS:
                  output = strip_python(source)
              elif extension in XML_EXTENSIONS:
                  output = strip_xml_and_embedded(source)
              elif extension in SQL_EXTENSIONS:
                  output = strip_sql(source)
              elif extension in BATCH_EXTENSIONS:
                  output = strip_batch(source)
              elif extension in HASH_EXTENSIONS or name in HASH_NAMES:
                  if extension in {".ps1", ".psm1"}:
                      output = strip_powershell_blocks(output)
                  output = strip_hash_comments(output)
              if output != source:
                  path.write_text(output, encoding="utf-8")

          remove_documents()
          for candidate in sorted(ROOT.rglob("*")):
              if candidate.is_file() and not ignored(candidate):
                  process_file(candidate)

          workflow = ROOT / ".github/workflows/strip-documentation-comments.yml"
          if workflow.exists():
              workflow.unlink()
          PY
          python "$RUNNER_TEMP/strip-repo.py"

      - name: Validate changes
        shell: bash
        run: |
          git diff --check
          cd cloud
          npm run check
          npm test

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Remove documentation and source comments [skip ci]"
          git push
