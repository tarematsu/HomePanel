name: Retire legacy videoscraper resources

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DELETE_VERIFIED_VIDEOSCRAPER
        required: true
        type: string
      migration_run_id:
        description: Successful unified cutover workflow run ID
        required: true
        type: string
      new_worker_base_url:
        description: Full base URL for the active homepanel Worker
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: videoscraper-retirement
  cancel-in-progress: false

jobs:
  retire:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_BUILDS_ACCOUNT_ID }}
      HOMEPANEL_RUNTIME_SECRETS_JSON: ${{ secrets.HOMEPANEL_RUNTIME_SECRETS_JSON }}
      NEW_WORKER_BASE_URL: ${{ inputs.new_worker_base_url }}

    steps:
      - name: Validate retirement inputs
        shell: bash
        run: |
          set -euo pipefail
          test "${{ inputs.confirmation }}" = "DELETE_VERIFIED_VIDEOSCRAPER"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$HOMEPANEL_RUNTIME_SECRETS_JSON"
          case "$NEW_WORKER_BASE_URL" in https://*) ;; *) exit 1;; esac

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        working-directory: video
        run: npm install --no-audit --no-fund

      - name: Download migration evidence
        uses: actions/download-artifact@v4
        with:
          name: homepanel-video-d1-migration-${{ inputs.migration_run_id }}
          run-id: ${{ inputs.migration_run_id }}
          github-token: ${{ github.token }}
          path: migration-evidence

      - name: Validate migration evidence
        shell: bash
        run: |
          set -euo pipefail
          manifest="$(find migration-evidence -name migration-manifest.json -type f -print -quit)"
          test -n "$manifest"
          node --input-type=module - "$manifest" <<'NODE'
          import { readFileSync } from 'node:fs';
          const manifest = JSON.parse(readFileSync(process.argv[2], 'utf8'));
          if (manifest.sourceDatabase !== 'twivideo-swiper-db') throw new Error('Unexpected source database');
          if (manifest.targetDatabase !== 'homepanel-data') throw new Error('Unexpected target database');
          if (manifest.foreignKeyCheck !== 'ok' || manifest.integrityCheck !== 'ok') {
            throw new Error('Migration integrity evidence is incomplete');
          }
          const source = manifest.sourceCounts || {};
          const target = manifest.targetCounts || {};
          const names = Object.keys(source);
          if (!names.length) throw new Error('Migration evidence contains no table counts');
          for (const name of names) {
            if (Number(source[name]) !== Number(target[name])) {
              throw new Error(`Row count mismatch for ${name}`);
            }
          }
          NODE

      - name: Verify active unified Worker
        shell: bash
        run: |
          set -euo pipefail
          secrets_file="$RUNNER_TEMP/homepanel-secrets.json"
          printf '%s' "$HOMEPANEL_RUNTIME_SECRETS_JSON" > "$secrets_file"
          admin_token="$(node --input-type=module - "$secrets_file" <<'NODE'
          import { readFileSync } from 'node:fs';
          const payload = JSON.parse(readFileSync(process.argv[2], 'utf8'));
          process.stdout.write(String(payload.ADMIN_TOKEN || ''));
          NODE
          )"
          test -n "$admin_token"
          curl --fail --silent --show-error "$NEW_WORKER_BASE_URL/v1/health" >/dev/null
          curl --fail --silent --show-error -H "Authorization: Bearer $admin_token" \
            "$NEW_WORKER_BASE_URL/api/status" >/dev/null

      - name: Delete legacy videoscraper Worker
        working-directory: video
        shell: bash
        run: yes | npx wrangler delete --name videoscraper

      - name: Delete legacy videoscraper D1 database
        working-directory: video
        run: npx wrangler d1 delete twivideo-swiper-db --skip-confirmation
