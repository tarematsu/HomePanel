name: Cloudflare Observability

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: Minutes of Cloudflare metrics and persisted errors to inspect
        required: false
        default: "60"
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-observability-hp-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  observability:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKERS: homepanel-cloud
      LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '60' }}

    steps:
      - name: Cloudflare account preflight
        shell: bash
        run: |
          set -euo pipefail
          auth="Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          curl --fail-with-body --silent --show-error -H "$auth" https://api.cloudflare.com/client/v4/user/tokens/verify | jq -e '.success == true' >/dev/null
          echo "token: ok"
          curl --fail-with-body --silent --show-error -H "$auth" 'https://api.cloudflare.com/client/v4/accounts?per_page=50' > /tmp/cf-accounts.json
          jq -e '.success == true' /tmp/cf-accounts.json >/dev/null
          count=$(jq '.result | length' /tmp/cf-accounts.json)
          echo "visible accounts: $count"
          if [[ -z "$CLOUDFLARE_ACCOUNT_ID" && "$count" -ne 1 ]]; then
            echo "Set repository variable CLOUDFLARE_ACCOUNT_ID because the token sees $count accounts" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Query Cloudflare metrics and persisted errors
        shell: bash
        run: python3 .github/scripts/query-cloudflare-observability.py
