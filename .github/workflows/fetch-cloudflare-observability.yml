name: Temporary radar R2 audit

on:
  pull_request:
    branches: [main]
    paths:
      - "cloud/**"
      - ".github/workflows/fetch-cloudflare-observability.yml"

permissions:
  contents: read

concurrency:
  group: radar-r2-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: homepanel-updates

    steps:
      - name: Derive R2 credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          verify="$(curl --fail-with-body --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" https://api.cloudflare.com/client/v4/user/tokens/verify)"
          token_id="$(jq -er '.result.id' <<<"$verify")"
          secret="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d' ' -f1)"
          accounts="$(curl --fail-with-body --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 'https://api.cloudflare.com/client/v4/accounts?per_page=50')"
          export AWS_ACCESS_KEY_ID="$token_id" AWS_SECRET_ACCESS_KEY="$secret"
          match=""
          while read -r account_id; do
            endpoint="https://${account_id}.r2.cloudflarestorage.com"
            if aws s3api head-bucket --endpoint-url "$endpoint" --bucket "$R2_BUCKET" >/dev/null 2>&1; then
              test -z "$match" || { echo 'Multiple matching accounts' >&2; exit 1; }
              match="$account_id"
            fi
          done < <(jq -r '.result[].id' <<<"$accounts")
          test -n "$match" || { echo "R2 bucket not accessible: $R2_BUCKET" >&2; exit 1; }
          echo "::add-mask::$token_id"
          echo "::add-mask::$secret"
          echo "AWS_ACCESS_KEY_ID=$token_id" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$secret" >> "$GITHUB_ENV"
          echo "R2_ENDPOINT=https://${match}.r2.cloudflarestorage.com" >> "$GITHUB_ENV"

      - name: Inventory radar objects
        shell: bash
        run: |
          set -euo pipefail
          aws s3api list-objects-v2 \
            --endpoint-url "$R2_ENDPOINT" \
            --bucket "$R2_BUCKET" \
            --prefix radar/ \
            --output json > radar-objects.json
          python3 - <<'PY'
          import datetime as dt
          import json
          import pathlib

          data = json.loads(pathlib.Path('radar-objects.json').read_text(encoding='utf-8'))
          objects = data.get('Contents') or []
          rows = []
          for item in objects:
              rows.append({
                  'key': item.get('Key'),
                  'size': item.get('Size'),
                  'lastModified': item.get('LastModified'),
                  'etag': item.get('ETag'),
              })
          rows.sort(key=lambda item: (item.get('lastModified') or '', item.get('key') or ''))
          manifest = next((item for item in rows if item.get('key') == 'radar/manifest.json'), None)
          frames = [item for item in rows if str(item.get('key') or '').startswith('radar/frames/')]
          report = {
              'ok': manifest is not None,
              'checkedAt': dt.datetime.now(dt.timezone.utc).isoformat().replace('+00:00', 'Z'),
              'manifestPresent': manifest is not None,
              'radarObjectCount': len(rows),
              'frameObjectCount': len(frames),
              'totalFrameBytes': sum(int(item.get('size') or 0) for item in frames),
              'oldestFrame': frames[0] if frames else None,
              'newestFrame': frames[-1] if frames else None,
              'objects': rows,
          }
          pathlib.Path('radar-r2-audit.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(report, ensure_ascii=False, separators=(',', ':')))
          PY

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-r2-audit-${{ github.run_id }}
          path: |
            radar-objects.json
            radar-r2-audit.json
          if-no-files-found: error
          retention-days: 1
