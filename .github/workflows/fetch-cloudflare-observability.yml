name: Cloudflare Observability

on:
  workflow_run:
    workflows: ["Deploy unified homepanel-cloud Worker"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch-cloudflare-observability.yml'
      - '.github/scripts/audit-cloudflare-daily-usage.py'
      - '.github/scripts/audit-cloudflare-telemetry.py'
      - '.github/scripts/query-cloudflare-observability.py'
      - '.github/scripts/capture-cloudflare-live-tail.mjs'
      - '.github/scripts/publish-homepanel-observability-status.mjs'
  schedule:
    - cron: "23 * * * *"
    - cron: "47 2 * * *"
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: Minutes of Cloudflare metrics and persisted errors to inspect
        required: false
        default: "60"
        type: string

permissions:
  actions: read
  contents: read
  issues: write
  statuses: write

concurrency:
  group: cloudflare-observability-hp-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

jobs:
  observability:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKERS: homepanel-cloud
      D1_CONFIG_GLOBS: cloud/wrangler*.jsonc
      LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '60' }}
      CPU_BUDGET_MS: "10"
      DURABLE_OBJECT_CPU_BUDGET_MS: "30000"
      DAILY_REQUEST_BUDGET: "3000"
      DAILY_REQUEST_RESERVE: "0"
      DAILY_D1_READ_BUDGET: "50000"
      DAILY_D1_WRITE_BUDGET: "3000"
      DAILY_USAGE_OUTPUT_DIR: daily-usage

    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Determine whether upstream run deployed the Worker
        id: deployment
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_RUN_ID: ${{ github.event.workflow_run.id }}
        shell: bash
        run: |
          set -euo pipefail
          jobs_json="$RUNNER_TEMP/upstream-deploy-jobs.json"
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$UPSTREAM_RUN_ID/jobs?per_page=100" \
            > "$jobs_json"
          python3 - "$jobs_json" >> "$GITHUB_OUTPUT" <<'PY'
          import json
          import sys

          target = "Deploy Worker with migration discovery only when required"
          with open(sys.argv[1], encoding="utf-8") as source:
              jobs = json.load(source).get("jobs") or []
          matches = [
              step
              for job in jobs
              for step in (job.get("steps") or [])
              if step.get("name") == target
          ]
          if not matches:
              raise SystemExit(f"Upstream deployment step was not found: {target}")
          conclusions = {str(step.get("conclusion") or "") for step in matches}
          if "success" in conclusions:
              print("deployed=true")
          elif conclusions == {"skipped"}:
              print("deployed=false")
          else:
              raise SystemExit(f"Unexpected upstream deployment conclusions: {sorted(conclusions)}")
          PY

      - name: Validate observability policy code
        id: policy-self-test
        run: |
          python3 .github/scripts/audit-cloudflare-daily-usage.py --self-test
          python3 .github/scripts/audit-cloudflare-telemetry.py --self-test
          node .github/scripts/publish-homepanel-observability-status.mjs --self-test

      - name: Enforce UTC daily request and D1 budgets
        id: daily-budget
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 .github/scripts/audit-cloudflare-daily-usage.py 2>&1 | tee daily-usage-audit.log

      - name: Report deferred post-deployment runtime audit
        if: ${{ github.event_name == 'workflow_run' && steps.deployment.outputs.deployed != 'true' }}
        run: echo "::notice::The upstream workflow completed without deploying the Worker; runtime telemetry audit is skipped."

      - name: Start deep audit window
        if: ${{ (github.event_name != 'schedule' || github.event.schedule == '47 2 * * *') && (github.event_name != 'workflow_run' || steps.deployment.outputs.deployed == 'true') }}
        shell: bash
        run: echo "AUDIT_FROM=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Collect metrics and live events in parallel
        id: observability-query
        continue-on-error: true
        if: ${{ (github.event_name != 'schedule' || github.event.schedule == '47 2 * * *') && (github.event_name != 'workflow_run' || steps.deployment.outputs.deployed == 'true') }}
        env:
          LIVE_TAIL_WORKER: homepanel-cloud
          LIVE_TAIL_SECONDS: "90"
          LIVE_TAIL_PROBES: /v1/health,/
        shell: bash
        run: |
          set -uo pipefail
          actual_summary="$GITHUB_STEP_SUMMARY"
          (
            GITHUB_STEP_SUMMARY=observability-summary.md \
              python3 .github/scripts/query-cloudflare-observability.py \
              > observability-query.log 2>&1
          ) &
          query_pid=$!
          (
            set +e
            node .github/scripts/capture-cloudflare-live-tail.mjs 2>&1 | tee live-tail.log
            exit 0
          ) &
          tail_pid=$!

          query_status=0
          wait "$query_pid" || query_status=$?
          wait "$tail_pid" || true
          cat observability-query.log
          if [[ -f observability-summary.md ]]; then
            cat observability-summary.md >> "$actual_summary"
          fi
          exit "$query_status"

      - name: Enforce current-version persisted and live CPU policy
        id: telemetry-policy
        continue-on-error: true
        if: ${{ (github.event_name != 'schedule' || github.event.schedule == '47 2 * * *') && (github.event_name != 'workflow_run' || steps.deployment.outputs.deployed == 'true') }}
        env:
          LIVE_TAIL_LOG: live-tail.log
        shell: bash
        run: |
          set -o pipefail
          actual_summary="$GITHUB_STEP_SUMMARY"
          GITHUB_STEP_SUMMARY=telemetry-summary.md \
            python3 .github/scripts/audit-cloudflare-telemetry.py 2>&1 | tee telemetry-audit.log
          status=${PIPESTATUS[0]}
          if [[ -f telemetry-summary.md ]]; then
            cat telemetry-summary.md >> "$actual_summary"
          fi
          exit "$status"

      - name: Publish persistent observability status
        id: publish-status
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OBSERVABILITY_TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          OBSERVABILITY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OBSERVABILITY_TRIGGER: ${{ github.event_name }}
          POLICY_OUTCOME: ${{ steps.policy-self-test.outcome }}
          DAILY_BUDGET_OUTCOME: ${{ steps.daily-budget.outcome }}
          OBSERVABILITY_QUERY_OUTCOME: ${{ steps.observability-query.outcome }}
          TELEMETRY_POLICY_OUTCOME: ${{ steps.telemetry-policy.outcome }}
        run: node .github/scripts/publish-homepanel-observability-status.mjs

      - name: Upload sanitized observability report
        if: ${{ always() && (github.event_name != 'schedule' || github.event.schedule == '47 2 * * *' || steps.daily-budget.outcome == 'failure' || steps.observability-query.outcome == 'failure' || steps.telemetry-policy.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-observability-report-hp-${{ github.run_id }}
          path: |
            daily-usage/
            daily-usage-audit.log
            observability-summary.md
            observability-query.log
            telemetry-summary.md
            telemetry-audit.log
            live-tail.log
          if-no-files-found: warn
          retention-days: 1

      - name: Fail when an observability gate failed
        if: ${{ always() && (steps.policy-self-test.outcome == 'failure' || steps.daily-budget.outcome == 'failure' || steps.observability-query.outcome == 'failure' || steps.telemetry-policy.outcome == 'failure' || steps.publish-status.outcome == 'failure') }}
        run: exit 1
