name: Cloudflare PR diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - "cloud/**"
      - ".github/workflows/cloudflare-pr-diagnostics.yml"
      - ".github/scripts/cloudflare-build-diagnostics.mjs"
      - ".github/scripts/resolve-cloudflare-config.mjs"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cloudflare-pr-diagnostics-hp-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      TARGET_SHA: ${{ github.event.pull_request.head.sha }}
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve Cloudflare settings
        id: resolve
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
        run: node .github/scripts/resolve-cloudflare-config.mjs

      - name: Install Wrangler for D1 insights
        working-directory: cloud
        run: npm ci --no-audit --no-fund

      - name: Collect D1 query usage insights
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
          D1_DATABASE_NAME: ${{ steps.resolve.outputs.database_name }}
        run: |
          set -eo pipefail
          mkdir -p .cloudflare-build-diagnostics
          cd cloud
          npx wrangler d1 insights "$D1_DATABASE_NAME" \
            --sort-type=sum --sort-by=reads --sort-direction=DESC \
            --limit=100 --timePeriod=1d --json \
            > ../.cloudflare-build-diagnostics/d1-insights-reads.json
          npx wrangler d1 insights "$D1_DATABASE_NAME" \
            --sort-type=sum --sort-by=writes --sort-direction=DESC \
            --limit=100 --timePeriod=1d --json \
            > ../.cloudflare-build-diagnostics/d1-insights-writes.json
          test -s ../.cloudflare-build-diagnostics/d1-insights-reads.json
          test -s ../.cloudflare-build-diagnostics/d1-insights-writes.json

      - name: Upload D1 query insights
        uses: actions/upload-artifact@v4
        with:
          name: d1-query-insights-${{ github.event.pull_request.head.sha }}
          path: .cloudflare-build-diagnostics/d1-insights-*.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

      - name: Watch Cloudflare build and collect logs
        id: cloudflare_build
        continue-on-error: true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
          CLOUDFLARE_WORKER_NAME: ${{ steps.resolve.outputs.worker_name }}
        run: node .github/scripts/cloudflare-build-diagnostics.mjs

      - name: Verify Cloudflare preview outcome
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.cloudflare_build.outcome }}" == "success" ]]; then
            exit 0
          fi

          log=.cloudflare-build-diagnostics/build.log
          if [[ -f "$log" ]] \
             && grep -Fq "code: 10211" "$log" \
             && grep -Fq "Durable Object migration" "$log" \
             && grep -Fq "versions upload" "$log"; then
            echo "::warning::Cloudflare preview versions cannot apply a first Durable Object migration; the non-versioned production deploy will apply it."
            exit 0
          fi

          echo "Cloudflare preview build failed for an unexpected reason."
          [[ -f "$log" ]] && tail -n 180 "$log"
          exit 1

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pr-diagnostics-${{ github.event.pull_request.head.sha }}
          path: .cloudflare-build-diagnostics/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
