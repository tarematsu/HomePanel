name: Temporary radar failed run log audit

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/radar-failed-run-log-audit.yml"

permissions:
  contents: read
  actions: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Download failed radar run logs
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: "29604408067"
        run: |
          set -euo pipefail
          mkdir -p report
          curl --fail-with-body --silent --show-error --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs/$FAILED_RUN_ID/logs" \
            --output report/logs.zip
          unzip -q report/logs.zip -d report/logs
          grep -R -n -E "radar build failed|Traceback|Error:|HTTP Error|RuntimeError" report/logs > report/errors.txt || true
          cat report/errors.txt

      - name: Upload failed logs
        uses: actions/upload-artifact@v4
        with:
          name: radar-failed-run-logs-${{ github.run_id }}
          path: report/
          if-no-files-found: error
          retention-days: 1
