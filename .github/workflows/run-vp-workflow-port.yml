name: Port VP workflows into HP root

on:
  issues:
    types:
      - opened
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: port-vp-workflows
  cancel-in-progress: false

jobs:
  port:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.issue.title == '[automation] Port VP workflows'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Report start
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'VP workflow port started.'
            });

      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/integrate-vp-video
          fetch-depth: 0

      - name: Port workflows
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --quiet 'ruamel.yaml>=0.18,<0.19'
          python3 <<'PY'
          from pathlib import Path
          from ruamel.yaml import YAML
          from ruamel.yaml.comments import CommentedMap, CommentedSeq

          source_dir = Path('video/.github/workflows')
          destination_dir = Path('.github/workflows')
          destination_dir.mkdir(parents=True, exist_ok=True)

          yaml = YAML()
          yaml.version = (1, 2)
          yaml.preserve_quotes = True
          yaml.width = 120
          yaml.indent(mapping=2, sequence=4, offset=2)

          workflow_files = sorted(source_dir.glob('*.y*ml'))
          if not workflow_files:
              raise RuntimeError('No VP workflows found under video/.github/workflows')

          target_names = {
              workflow.name: ('video-deploy.yml' if workflow.name == 'd1-migrate-deploy.yml' else f'video-{workflow.name}')
              for workflow in workflow_files
          }

          for stale in destination_dir.glob('video-*.y*ml'):
              stale.unlink()

          def transform_path(value, target_name):
              text = str(value).strip()
              negated = text.startswith('!')
              if negated:
                  text = text[1:]
              if text.startswith('.github/workflows/'):
                  text = f'.github/workflows/{target_name}'
              elif not text.startswith('video/'):
                  text = f'video/{text}'
              return f'!{text}' if negated else text

          def add_event_paths(events, event_name, target_name):
              if event_name not in events:
                  return
              config = events[event_name]
              if config is None:
                  config = CommentedMap()
                  events[event_name] = config
              if not isinstance(config, dict):
                  return
              existing = config.get('paths')
              paths = CommentedSeq()
              if existing:
                  for value in existing:
                      converted = transform_path(value, target_name)
                      if converted not in paths:
                          paths.append(converted)
              else:
                  paths.append('video/**')
                  paths.append(f'.github/workflows/{target_name}')
              config['paths'] = paths

          def prefix_workspace_path(value):
              if not isinstance(value, str):
                  return value
              output = []
              for line in value.splitlines():
                  stripped = line.strip()
                  if (
                      not stripped
                      or stripped.startswith('/')
                      or stripped.startswith('${{')
                      or stripped.startswith('video/')
                  ):
                      output.append(line)
                  else:
                      output.append(f'video/{stripped}')
              return '\n'.join(output)

          for source in workflow_files:
              target_name = target_names[source.name]
              with source.open('r', encoding='utf-8') as handle:
                  data = yaml.load(handle)
              if not isinstance(data, dict):
                  raise RuntimeError(f'Unexpected workflow structure: {source}')

              data['name'] = f"Video · {data.get('name', source.stem)}"

              events = data.get('on')
              if isinstance(events, dict):
                  add_event_paths(events, 'push', target_name)
                  add_event_paths(events, 'pull_request', target_name)

              concurrency = data.get('concurrency')
              if isinstance(concurrency, str):
                  data['concurrency'] = f'video-{concurrency}'
              elif isinstance(concurrency, dict) and concurrency.get('group'):
                  concurrency['group'] = f"video-{concurrency['group']}"

              for job in (data.get('jobs') or {}).values():
                  if not isinstance(job, dict):
                      continue
                  defaults = job.setdefault('defaults', CommentedMap())
                  run_defaults = defaults.setdefault('run', CommentedMap())
                  run_defaults['working-directory'] = 'video'

                  for step in job.get('steps') or []:
                      if not isinstance(step, dict):
                          continue
                      uses = str(step.get('uses', ''))
                      options = step.get('with')
                      if isinstance(options, dict):
                          if (
                              uses.startswith('actions/upload-artifact@')
                              or uses.startswith('actions/download-artifact@')
                          ) and 'path' in options:
                              options['path'] = prefix_workspace_path(options['path'])
                          if uses.startswith('actions/setup-node@') and 'cache-dependency-path' in options:
                              options['cache-dependency-path'] = prefix_workspace_path(options['cache-dependency-path'])

                      run = step.get('run')
                      if isinstance(run, str):
                          step['run'] = run.replace(
                              'cloudflare/production-deploy',
                              'video/cloudflare-production-deploy'
                          )

              target = destination_dir / target_name
              with target.open('w', encoding='utf-8') as handle:
                  yaml.dump(data, handle)

          generated = sorted(destination_dir.glob('video-*.y*ml'))
          if len(generated) != len(workflow_files):
              raise RuntimeError(f'Expected {len(workflow_files)} workflows, generated {len(generated)}')
          for workflow in generated:
              with workflow.open('r', encoding='utf-8') as handle:
                  yaml.load(handle)
          PY

      - name: Commit ported workflows
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/video-*.yml
          git commit -m 'Port VP workflows to monorepo root'
          git push origin HEAD:agent/integrate-vp-video

      - name: Report success
        if: success() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'VP workflows were ported and pushed to PR #204.'
            });

      - name: Report failure
        if: failure() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'VP workflow port failed. Inspect the workflow run logs.'
            });
