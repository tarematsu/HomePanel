name: Video · Sync D1 database ID

on:
  push:
    branches:
      - '**'
    paths:
      - 'video/**'
      - '.github/workflows/video-sync-d1-id.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: video-sync-d1-id-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: video
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Resolve and write D1 database ID
        run: node scripts/sync-d1-database-id.mjs
      - name: Commit synchronized D1 ID
        shell: bash
        run: |
          if git diff --quiet -- wrangler.jsonc; then
            echo "wrangler.jsonc already has the current D1 ID."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wrangler.jsonc
          git commit -m "chore(video): D1 database IDを同期"
          git push origin "HEAD:${GITHUB_REF_NAME}"
