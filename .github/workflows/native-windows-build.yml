name: Finalize Octopus profile chart

on:
  push:
    branches:
      - agent/fix-octopus-complete-day-profile
    paths:
      - .github/workflows/native-windows-build.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Finalize renderer and restore CI
        run: |
          python .github/scripts/patch_octopus_profile_chart.py
          git fetch origin main
          git checkout origin/main -- .github/workflows/native-windows-build.yml
          git rm -f .github/workflows/patch-octopus-profile-chart.yml
          git rm -f .github/scripts/patch_octopus_profile_chart.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/src/renderer_panels.cpp .github/workflows/native-windows-build.yml
          git commit -m "Finalize Octopus average profile chart"
          git push origin HEAD:${{ github.ref_name }}
