name: Patch Octopus profile chart

on:
  push:
    branches:
      - agent/fix-octopus-complete-day-profile
    paths:
      - .github/workflows/native-windows-build.yml
      - .github/scripts/patch_octopus_profile_chart.py
  pull_request:
    paths:
      - native/**
      - .github/workflows/native-windows-build.yml
      - .github/scripts/patch_octopus_profile_chart.py

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Replace energy bars with average profile lines
        run: python .github/scripts/patch_octopus_profile_chart.py
      - name: Commit renderer update
        run: |
          if git diff --quiet -- native/src/renderer_panels.cpp; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/src/renderer_panels.cpp
          git commit -m "Draw Octopus half-hour average profiles"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
