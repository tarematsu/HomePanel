name: Video · Exhaustive check

on:
  push:
    paths:
      - 'video/**'
      - '.github/workflows/video-check.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: video-exhaustive-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exhaustive-check:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
        (contains(github.event.head_commit.message, '[ci full]') ||
         github.ref == 'refs/heads/automation/hourly-improvements'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: video
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run syntax and unit tests
        run: npm run check
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Validate Worker bundle
        run: |
          rm -rf dist-dry-run
          npx wrangler deploy --dry-run --outdir dist-dry-run
          test -n "$(find dist-dry-run -type f -size +0c -print -quit)"
      - name: Validate D1 migrations in isolation
        run: |
          rm -rf .wrangler-ci-state
          npx wrangler d1 migrations apply twivideo-swiper-db --local --persist-to .wrangler-ci-state
          npx wrangler d1 execute twivideo-swiper-db --local --persist-to .wrangler-ci-state --command "PRAGMA integrity_check;"
