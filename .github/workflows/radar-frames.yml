name: Publish radar frames
run-name: Radar frames · ${{ github.event_name }} · ${{ github.event.schedule || github.sha }}

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/radar-frames.yml"
      - ".github/scripts/build-radar-frames.py"
      - ".github/scripts/test_build_radar_frames.py"

permissions:
  contents: read

concurrency:
  group: radar-frame-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_BUILDS_ACCOUNT_ID }}
      RADAR_CENTER_LAT: ${{ vars.RADAR_CENTER_LAT || '35.8923181' }}
      RADAR_CENTER_LON: ${{ vars.RADAR_CENTER_LON || '139.4858691' }}
      RADAR_ZOOM: ${{ vars.RADAR_ZOOM || '10' }}

    steps:
      - name: Log trigger
        env:
          RADAR_TRIGGER_SCHEDULE: ${{ github.event.schedule || 'not-scheduled' }}
        run: |
          printf 'event=%s schedule=%s ref=%s sha=%s\n' \
            "$GITHUB_EVENT_NAME" "$RADAR_TRIGGER_SCHEDULE" "$GITHUB_REF" "$GITHUB_SHA"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure runtime paths
        run: printf 'RADAR_WORK_DIR=%s/homepanel-radar\n' "$RUNNER_TEMP" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check "Pillow==11.3.0"
          npm ci --no-audit --no-fund
        working-directory: cloud

      - name: Test radar frame builder
        run: python .github/scripts/test_build_radar_frames.py

      - name: Resolve Cloudflare settings
        id: resolve
        run: node .github/scripts/resolve-cloudflare-config.mjs

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "CLOUDFLARE_API_TOKEN or CLOUDFLARE_BUILDS_API_TOKEN is not configured"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "CLOUDFLARE_ACCOUNT_ID is not configured"; exit 1; }

      - name: Download existing radar manifest
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
        run: |
          set -euo pipefail
          mkdir -p "$RADAR_WORK_DIR"
          npx wrangler r2 object get \
            "homepanel-updates/radar/manifest.json" \
            --file="$RADAR_WORK_DIR/existing-manifest.json" \
            --remote \
            || rm -f "$RADAR_WORK_DIR/existing-manifest.json"
        working-directory: cloud

      - name: Build radar WebP frames
        run: |
          python .github/scripts/build-radar-frames.py \
            --output-dir "$RADAR_WORK_DIR" \
            --existing-manifest "$RADAR_WORK_DIR/existing-manifest.json" \
            --center-lat "$RADAR_CENTER_LAT" \
            --center-lon "$RADAR_CENTER_LON" \
            --zoom "$RADAR_ZOOM"

      - name: Publish radar frames to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
        run: |
          set -euo pipefail
          while IFS=$'\t' read -r file key; do
            test -n "$key" || continue
            npx wrangler r2 object put "homepanel-updates/$key" \
              --file="$file" \
              --content-type="image/webp" \
              --cache-control="private, max-age=10800, immutable" \
              --remote \
              --force
          done < "$RADAR_WORK_DIR/uploads.tsv"

          npx wrangler r2 object put "homepanel-updates/radar/manifest.json" \
            --file="$RADAR_WORK_DIR/manifest.json" \
            --content-type="application/json" \
            --cache-control="private, max-age=0, must-revalidate" \
            --remote \
            --force

          while IFS=$'\t' read -r key; do
            test -n "$key" || continue
            npx wrangler r2 object delete "homepanel-updates/$key" --remote --force \
              || echo "warning: failed to delete stale radar object $key"
          done < "$RADAR_WORK_DIR/deletes.tsv"
        working-directory: cloud
