name: Apply Stationhead follow-up fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/isolate-stationhead-webview-data'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply focused follow-up fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          def sub_once(text: str, pattern: str, replacement: str, label: str) -> str:
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S | re.M)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return updated

          messages_path = Path('native/src/app_messages.cpp')
          messages = messages_path.read_text(encoding='utf-8')
          old_notifications = (
              '      const uint32_t changes = stationhead_->ConsumeChangeFlags();\n'
              '      bool layoutChanged = false;\n'
              '      if ((changes & StationheadChangeReleaseAuth) != 0) {\n'
              '        stationhead_->ReleaseCompletedAuth();\n'
              '      }\n'
              '      if ((changes & StationheadChangeShowPlayer) != 0) {\n'
              '        stationhead_->ShowAfterAudioStop();\n'
              '        if (selectedTab_ != WorkspaceTab::Stationhead) {\n'
              '          selectedTab_ = WorkspaceTab::Stationhead;\n'
              '          layoutChanged = true;\n'
              '        }\n'
              '      } else if ((changes & StationheadChangeReturnMain) != 0 &&\n'
              '                 selectedTab_ != WorkspaceTab::Main) {\n'
              '        selectedTab_ = WorkspaceTab::Main;\n'
              '        layoutChanged = true;\n'
              '      }\n'
          )
          new_notifications = (
              '      const uint32_t primaryChanges = stationhead_->ConsumeChangeFlags();\n'
              '      const uint32_t secondaryChanges = secondaryStationhead_\n'
              '          ? secondaryStationhead_->ConsumeChangeFlags()\n'
              '          : 0;\n'
              '      const uint32_t changes = primaryChanges | secondaryChanges;\n'
              '      bool layoutChanged = false;\n'
              '      if ((primaryChanges & StationheadChangeReleaseAuth) != 0) {\n'
              '        stationhead_->ReleaseCompletedAuth();\n'
              '      }\n'
              '      if (secondaryStationhead_ &&\n'
              '          (secondaryChanges & StationheadChangeReleaseAuth) != 0) {\n'
              '        secondaryStationhead_->ReleaseCompletedAuth();\n'
              '      }\n'
              '      bool showPlayer = false;\n'
              '      if ((primaryChanges & StationheadChangeShowPlayer) != 0) {\n'
              '        stationhead_->ShowAfterAudioStop();\n'
              '        showPlayer = true;\n'
              '      }\n'
              '      if (secondaryStationhead_ &&\n'
              '          (secondaryChanges & StationheadChangeShowPlayer) != 0) {\n'
              '        secondaryStationhead_->ShowAfterAudioStop();\n'
              '        showPlayer = true;\n'
              '      }\n'
              '      if (showPlayer) {\n'
              '        if (selectedTab_ != WorkspaceTab::Stationhead) {\n'
              '          selectedTab_ = WorkspaceTab::Stationhead;\n'
              '          layoutChanged = true;\n'
              '        }\n'
              '      } else if ((changes & StationheadChangeReturnMain) != 0 &&\n'
              '                 selectedTab_ != WorkspaceTab::Main) {\n'
              '        selectedTab_ = WorkspaceTab::Main;\n'
              '        layoutChanged = true;\n'
              '      }\n'
          )
          messages = replace_once(
              messages, old_notifications, new_notifications,
              'consume role-specific Stationhead notifications')
          messages_path.write_text(messages, encoding='utf-8')

          sh_path = Path('native/src/sh.cpp')
          sh = sh_path.read_text(encoding='utf-8')
          sh = sub_once(
              sh,
              r'^        HRESULT started = E_FAIL;\n.*?^        if \(FAILED\(started\)\) \{',
              '        const HRESULT started =\n'
              '            environment_->CreateCoreWebView2Controller(hostWindow_, onController.Get());\n'
              '        if (FAILED(started)) {',
              'remove redundant playback multi-profile controller path')
          sh = sub_once(
              sh,
              r'^  if \(!IsSecondary\(\)\) \{\n    environment_->CreateCoreWebView2Controller\(authHostWindow_, onController.Get\(\)\);\n    return;\n  \}\n  ComPtr<ICoreWebView2Environment10> environment10;\n.*?^  environment10->CreateCoreWebView2ControllerWithOptions\(authHostWindow_, options.Get\(\), onController.Get\(\)\);\n',
              '  environment_->CreateCoreWebView2Controller(authHostWindow_, onController.Get());\n',
              'remove redundant auth multi-profile controller path')
          sh_path.write_text(sh, encoding='utf-8')

          webview_path = Path('native/src/sh_webview.cpp')
          webview = webview_path.read_text(encoding='utf-8')
          webview = sub_once(
              webview,
              r'^            HRESULT createResult = E_FAIL;\n.*?^            if \(FAILED\(createResult\)\) \{',
              '            const HRESULT createResult =\n'
              '                environment_->CreateCoreWebView2Controller(authHostWindow_, onController.Get());\n'
              '            if (FAILED(createResult)) {',
              'remove redundant popup multi-profile controller path')
          webview = replace_once(
              webview,
              '    status_.detail = IsSecondary() ? L"creating isolated WebView2 profile" : L"起動中";\n',
              '    status_.detail = IsSecondary() ? L"creating isolated WebView2 environment" : L"起動中";\n',
              'update isolated environment status')
          webview_path.write_text(webview, encoding='utf-8')

          audio_path = Path('native/src/sh_audio.cpp')
          audio = audio_path.read_text(encoding='utf-8')
          audio = replace_once(
              audio,
              "// Window B's isolated WebView2 profile still ships the platform's default\n",
              "// Window B's isolated WebView2 environment still ships the platform's default\n",
              'update isolated environment comment')
          audio_path.write_text(audio, encoding='utf-8')

          combined = '\n'.join([
              messages_path.read_text(encoding='utf-8'),
              sh_path.read_text(encoding='utf-8'),
              webview_path.read_text(encoding='utf-8'),
          ])
          if 'stationhead-secondary' in combined:
              raise SystemExit('legacy secondary profile name remains')
          if 'ICoreWebView2Environment10' in combined:
              raise SystemExit('legacy multi-profile API dependency remains')
          if 'secondaryStationhead_->ConsumeChangeFlags()' not in combined:
              raise SystemExit('secondary change notification latch is not consumed')
          PY

          rm .github/workflows/apply-stationhead-followup-fixes.yml
          rm .github/workflows/diagnose-stationhead-followup.yml
          git diff --check

      - name: Commit follow-up fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/src/app_messages.cpp native/src/sh.cpp \
            native/src/sh_webview.cpp native/src/sh_audio.cpp \
            .github/workflows/apply-stationhead-followup-fixes.yml \
            .github/workflows/diagnose-stationhead-followup.yml
          git commit -m "Fix secondary Stationhead notifications and recreation"
          git push origin HEAD:${{ github.head_ref }}
