name: Apply Stationhead recovery patch

on:
  push:
    branches:
      - agent/stabilize-stationhead-startup

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply focused Stationhead recovery changes
        run: python .github/scripts/apply_stationhead_recovery.py

      - name: Commit patch to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Stationhead 52分更新後の音声復帰を監視"
          git push
