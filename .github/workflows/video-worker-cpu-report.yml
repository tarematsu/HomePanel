name: Video · Worker CPU report

on:
  workflow_dispatch:
    inputs:
      hours:
        description: Analytics window in hours
        required: false
        default: '6'
      target_ms:
        description: CPU target in milliseconds
        required: false
        default: '10'

permissions:
  contents: read

concurrency:
  group: video-worker-cpu-report
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: video
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_OBSERVABILITY_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKER_NAME: ${{ secrets.HOMEPANEL_CLOUDFLARE_WORKER_NAME || vars.HOMEPANEL_CLOUDFLARE_WORKER_NAME || 'homepanel' }}
      REPORT_HOURS: ${{ inputs.hours || '6' }}
      CPU_TARGET_MS: ${{ inputs.target_ms || '10' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate Cloudflare token
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Cloudflare API token is not configured"; exit 1; }
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then unset CLOUDFLARE_ACCOUNT_ID; fi
      - name: Query aggregate production Worker CPU
        shell: bash
        run: |
          set -euo pipefail
          node scripts/report-worker-cpu.mjs \
            --hours "$REPORT_HOURS" \
            --target-ms "$CPU_TARGET_MS" \
            --out-json worker-cpu-report.json \
            --out-markdown worker-cpu-report.md
          cat worker-cpu-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Query exact returned invocation CPU
        shell: bash
        run: |
          set -euo pipefail
          node scripts/report-worker-invocations.mjs \
            --hours "$REPORT_HOURS" \
            --target-ms "$CPU_TARGET_MS" \
            --allow-unavailable true \
            --out-json worker-invocations-report.json \
            --out-markdown worker-invocations-report.md
          printf '\n' >> "$GITHUB_STEP_SUMMARY"
          cat worker-invocations-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload CPU reports
        uses: actions/upload-artifact@v4
        with:
          name: video-worker-cpu-report-${{ github.run_id }}
          path: |
            video/worker-cpu-report.json
            video/worker-cpu-report.md
            video/worker-invocations-report.json
            video/worker-invocations-report.md
          if-no-files-found: error
          retention-days: 30
