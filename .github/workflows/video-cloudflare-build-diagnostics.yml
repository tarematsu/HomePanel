name: Video · Cloudflare build diagnostics

on:
  push:
    branches:
      - main
    paths:
      - 'video/**'
      - '.github/workflows/video-cloudflare-build-diagnostics.yml'
  pull_request:
    paths:
      - 'video/**'
      - '.github/workflows/video-cloudflare-build-diagnostics.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: video-cloudflare-build-diagnostics-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: video
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_WORKER_NAME: ${{ secrets.VIDEO_CLOUDFLARE_WORKER_NAME || vars.VIDEO_CLOUDFLARE_WORKER_NAME || 'videoscraper' }}
      TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Sync D1 database ID
        id: d1
        shell: bash
        run: |
          node scripts/sync-d1-database-id.mjs
          if git diff --quiet -- wrangler.jsonc; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wrangler.jsonc
          git commit -m "chore(video): D1 database IDを同期"
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Watch exact Cloudflare build and collect logs
        if: steps.d1.outputs.changed != 'true'
        id: monitor
        shell: bash
        run: |
          set +e
          mkdir -p cloudflare-build-diagnostics
          node .github/scripts/cloudflare-build-diagnostics.mjs
          code=$?
          if [ -d .cloudflare-build-diagnostics ]; then
            cp -R .cloudflare-build-diagnostics/. cloudflare-build-diagnostics/ || true
          fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Show Cloudflare build report
        if: always() && steps.d1.outputs.changed != 'true'
        shell: bash
        run: |
          if [ -f cloudflare-build-diagnostics/comment.md ]; then
            cat cloudflare-build-diagnostics/comment.md
          fi
          if [ -f cloudflare-build-diagnostics/build.log ]; then
            tail -n 160 cloudflare-build-diagnostics/build.log
          fi
      - name: Upload Cloudflare diagnostics
        if: always() && steps.d1.outputs.changed != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: video-cloudflare-build-diagnostics-${{ env.TARGET_SHA }}
          path: video/cloudflare-build-diagnostics/
          if-no-files-found: warn
          retention-days: 14
      - name: Fail the diagnostic check
        if: steps.d1.outputs.changed != 'true' && steps.monitor.outputs.exit_code != '0'
        shell: bash
        run: exit "${{ steps.monitor.outputs.exit_code }}"
