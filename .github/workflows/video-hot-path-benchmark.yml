name: Video · Hot path benchmark

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/video-hot-path-benchmark.yml'
      - 'video/package.json'
      - 'video/scripts/benchmark-hot-path.mjs'
      - 'video/test/hot-path-benchmark.test.js'

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: video
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Measure warm Worker hot path
        shell: bash
        run: |
          set -e -o pipefail
          npm run --silent benchmark:hot-path -- --warmup=1000 --samples=25 --iterations=500 | tee hot-path-benchmark.json
      - uses: actions/upload-artifact@v4
        with:
          name: video-hot-path-benchmark-${{ github.event.pull_request.head.sha || github.sha }}
          path: video/hot-path-benchmark.json
          if-no-files-found: error
          retention-days: 14
