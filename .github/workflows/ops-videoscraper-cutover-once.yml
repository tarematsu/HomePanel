# One-time production cutover trigger
name: Ops one-time videoscraper cutover

on:
  push:
    branches:
      - ops/videoscraper-cutover-20260721
    paths:
      - .github/workflows/ops-videoscraper-cutover-once.yml

permissions:
  contents: read

concurrency:
  group: homepanel-cloud-video-cutover
  cancel-in-progress: false

jobs:
  cutover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_BUILDS_ACCOUNT_ID }}
      HOMEPANEL_D1_DATABASE_ID: ${{ secrets.HOMEPANEL_D1_DATABASE_ID }}
      VIDEO_SOURCE_D1_NAME: twivideo-swiper-db
      HOMEPANEL_D1_DATABASE_NAME: homepanel-data
      VIDEO_QUEUE_NAME: videoscraper-manual-imports

    steps:
      - name: Validate production credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm --prefix cloud ci --no-audit --no-fund
          npm --prefix video install --no-audit --no-fund

      - name: Resolve and verify Worker URLs
        shell: bash
        run: |
          set -euo pipefail
          response="$RUNNER_TEMP/workers-subdomain.json"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            > "$response"
          subdomain="$(node --input-type=module - "$response" <<'NODE'
          import { readFileSync } from 'node:fs';
          const payload = JSON.parse(readFileSync(process.argv[2], 'utf8'));
          const value = String(payload?.result?.subdomain || '').trim();
          if (!payload?.success || !value) throw new Error('Cloudflare Workers subdomain could not be resolved');
          process.stdout.write(value);
          NODE
          )"
          homepanel_url="https://homepanel-cloud.${subdomain}.workers.dev"
          video_url="https://videoscraper.${subdomain}.workers.dev"
          echo "HOMEPANEL_BASE_URL=$homepanel_url" >> "$GITHUB_ENV"
          echo "OLD_VIDEO_BASE_URL=$video_url" >> "$GITHUB_ENV"
          curl --fail --silent --show-error "$homepanel_url/v1/health" > "$RUNNER_TEMP/homepanel-before.json"
          curl --fail --silent --show-error "$video_url/" > "$RUNNER_TEMP/video-before.html"

      - name: Verify ADMIN_TOKEN is configured on homepanel-cloud
        working-directory: cloud
        shell: bash
        run: |
          set -euo pipefail
          secret_list="$RUNNER_TEMP/homepanel-cloud-secret-list.json"
          npx wrangler secret list --name homepanel-cloud --format json > "$secret_list"
          node --input-type=module - "$secret_list" <<'NODE'
          import { readFileSync } from 'node:fs';
          const payload = JSON.parse(readFileSync(process.argv[2], 'utf8'));
          const entries = Array.isArray(payload) ? payload : payload.result;
          if (!Array.isArray(entries)) throw new Error('Unexpected Wrangler secret-list response');
          const names = new Set(entries.map((entry) => String(entry?.name || '')));
          if (!names.has('ADMIN_TOKEN')) throw new Error('ADMIN_TOKEN is missing from homepanel-cloud');
          NODE

      - name: Ensure video queues exist
        working-directory: video
        shell: bash
        run: |
          set -euo pipefail
          for queue in videoscraper-manual-imports videoscraper-manual-imports-dlq; do
            npx wrangler queues info "$queue" >/dev/null 2>&1 || npx wrangler queues create "$queue"
          done

      - name: Apply pending source migrations
        working-directory: video
        run: npm run db:migrate:remote

      - name: Prepare target schema and deactivate video routes
        working-directory: cloud
        shell: bash
        run: |
          set -euo pipefail
          npm run prepare:existing
          config=.wrangler/generated/homepanel-existing.jsonc
          npx wrangler d1 migrations apply homepanel-data --remote --config "$config"
          npx wrangler d1 execute homepanel-data --remote --config "$config" \
            --command "UPDATE video_runtime_state SET active=0, activated_at=NULL WHERE id=1;"

      - name: Freeze legacy videoscraper writes
        working-directory: video
        shell: bash
        run: |
          set -euo pipefail
          npx wrangler deploy --config wrangler.jsonc --keep-vars --var VIDEO_MIGRATION_FREEZE:true
          status="$(curl --silent --show-error --output "$RUNNER_TEMP/old-freeze.json" --write-out '%{http_code}' "$OLD_VIDEO_BASE_URL/api/status")"
          test "$status" = "503"

      - name: Detach legacy queue consumers
        working-directory: video
        shell: bash
        run: |
          set -euo pipefail
          for worker in videoscraper homepanel; do
            npx wrangler queues consumer worker remove "$VIDEO_QUEUE_NAME" "$worker" || true
          done

      - name: Remove abandoned renamed homepanel Worker
        shell: bash
        run: |
          set -euo pipefail
          response="$RUNNER_TEMP/delete-renamed-homepanel.json"
          status="$(curl --silent --show-error --output "$response" --write-out '%{http_code}' \
            -X DELETE \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/homepanel")"
          case "$status" in
            200|404) ;;
            *) cat "$response"; exit 1 ;;
          esac

      - name: Deploy unified code to homepanel-cloud
        working-directory: cloud
        shell: bash
        run: |
          set -euo pipefail
          config=.wrangler/generated/homepanel-existing.jsonc
          npx wrangler deploy --config "$config" --keep-vars
          curl --fail --silent --show-error "$HOMEPANEL_BASE_URL/v1/health" > "$RUNNER_TEMP/homepanel-health.json"
          status="$(curl --silent --show-error --output "$RUNNER_TEMP/inactive-video.json" --write-out '%{http_code}' "$HOMEPANEL_BASE_URL/api/status")"
          test "$status" = "503"

      - name: Copy, verify, and activate videoscraper data
        working-directory: cloud
        run: npm run migrate:videoscraper

      - name: Verify unified routes
        shell: bash
        run: |
          set -euo pipefail
          sleep 6
          curl --fail --silent --show-error "$HOMEPANEL_BASE_URL/v1/health" > "$RUNNER_TEMP/final-health.json"
          curl --fail --silent --show-error "$HOMEPANEL_BASE_URL/" > "$RUNNER_TEMP/final-video-page.html"
          status="$(curl --silent --show-error --output "$RUNNER_TEMP/final-video-auth.json" --write-out '%{http_code}' "$HOMEPANEL_BASE_URL/api/status")"
          case "$status" in
            401|403) ;;
            *) cat "$RUNNER_TEMP/final-video-auth.json"; exit 1 ;;
          esac

      - name: Upload migration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: homepanel-video-d1-migration-${{ github.run_id }}
          path: cloud/.wrangler/video-d1-export/
          if-no-files-found: warn
          retention-days: 90

      - name: Deactivate unified video runtime on failure
        if: failure()
        working-directory: cloud
        continue-on-error: true
        shell: bash
        run: |
          npm run prepare:existing
          config=.wrangler/generated/homepanel-existing.jsonc
          npx wrangler d1 execute homepanel-data --remote --config "$config" \
            --command "UPDATE video_runtime_state SET active=0, activated_at=NULL WHERE id=1;"

      - name: Detach homepanel-cloud queue consumer on failure
        if: failure()
        working-directory: video
        continue-on-error: true
        run: npx wrangler queues consumer worker remove "$VIDEO_QUEUE_NAME" homepanel-cloud

      - name: Restore videoscraper on failure
        if: failure()
        working-directory: video
        continue-on-error: true
        run: npx wrangler deploy --config wrangler.jsonc --keep-vars --var VIDEO_MIGRATION_FREEZE:false

      - name: Write cutover summary
        if: success()
        run: |
          {
            echo '## videoscraper migration verified'
            echo
            echo "- Unified Worker: homepanel-cloud"
            echo "- Unified D1: homepanel-data"
            echo "- HomePanel URL: $HOMEPANEL_BASE_URL"
            echo "- Queue consumer: homepanel-cloud"
            echo "- Legacy videoscraper remains frozen pending evidence-gated retirement"
          } >> "$GITHUB_STEP_SUMMARY"
