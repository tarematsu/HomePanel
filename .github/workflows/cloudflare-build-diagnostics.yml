name: Cloudflare diagnostics

on:
  pull_request:
    paths:
      - "cloud/**"
      - ".github/workflows/cloudflare-build-diagnostics.yml"
      - ".github/scripts/cloudflare-build-diagnostics.mjs"
      - ".github/scripts/resolve-cloudflare-config.mjs"
  push:
    branches:
      - main
    paths:
      - "cloud/**"
      - ".github/workflows/cloudflare-build-diagnostics.yml"
      - ".github/scripts/cloudflare-build-diagnostics.mjs"
      - ".github/scripts/resolve-cloudflare-config.mjs"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: cloudflare-diagnostics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cloud

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Worker dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee ../cloud-check.log

      - name: Worker tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee ../cloud-test.log

      - name: Validate local D1 migrations
        run: npm run migrate:local

      - name: Wrangler dry-run bundle validation
        shell: bash
        run: |
          set -eo pipefail
          rm -rf .wrangler-ci-output
          npx wrangler deploy --dry-run --outdir .wrangler-ci-output
          test -n "$(find .wrangler-ci-output -type f -size +0c -print -quit)"

      - name: Upload cloud validation logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-validation-logs
          path: |
            cloud-check.log
            cloud-test.log
          if-no-files-found: warn
          retention-days: 7

  diagnose:
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      TARGET_SHA: ${{ github.sha }}
      TARGET_BRANCH: ${{ github.ref_name }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve Cloudflare settings
        id: resolve
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
        run: node .github/scripts/resolve-cloudflare-config.mjs

      - name: Watch exact Cloudflare build and collect logs
        id: monitor
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
          CLOUDFLARE_WORKER_NAME: ${{ steps.resolve.outputs.worker_name }}
        run: |
          set +e
          node .github/scripts/cloudflare-build-diagnostics.mjs
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Prepare success or failure report
        if: always() && steps.monitor.outputs.exit_code != ''
        shell: bash
        env:
          CLOUDFLARE_WORKER_NAME: ${{ steps.resolve.outputs.worker_name }}
          MONITOR_EXIT_CODE: ${{ steps.monitor.outputs.exit_code }}
        run: |
          node --input-type=module <<'NODE'
          import { mkdir, readFile, writeFile } from 'node:fs/promises';

          const directory = '.cloudflare-build-diagnostics';
          const read = async (name) => {
            try {
              return await readFile(`${directory}/${name}`, 'utf8');
            } catch {
              return '';
            }
          };

          await mkdir(directory, { recursive: true });
          let result = {};
          try {
            result = JSON.parse(await read('result.json'));
          } catch {
            result = {};
          }

          const exitCode = String(process.env.MONITOR_EXIT_CODE || '1');
          const succeeded = exitCode === '0' && result.ok === true;
          const log = await read('build.log');
          const excerpt = String(log || result.reason || 'No Cloudflare build log was returned.')
            .split(/\r?\n/)
            .slice(-180)
            .join('\n')
            .slice(-52000)
            .replace(/```/g, '`\u200b``');
          const worker = process.env.CLOUDFLARE_WORKER_NAME || 'unknown';
          const sha = process.env.TARGET_SHA || 'unknown';
          const branch = process.env.TARGET_BRANCH || 'unknown';
          const outcome = result.outcome || (succeeded ? 'success' : 'diagnostic-error');
          const heading = succeeded ? '✅ Success' : '❌ Failure';
          const open = succeeded ? '' : ' open';
          const body = `<!-- cloudflare-build-diagnostics:${worker} -->
          ## Cloudflare Worker build: ${heading}

          - Worker: \`${worker}\`
          - Commit: \`${sha}\`
          - Branch: \`${branch}\`
          - Build UUID: \`${result.build_uuid || 'not-found'}\`
          - Status: \`${result.status || 'not-found'}\`
          - Outcome: \`${outcome}\`

          <details${open}>
          <summary>Build log excerpt (last 180 lines)</summary>

          \`\`\`text
          ${excerpt}
          \`\`\`

          </details>

          The complete sanitized log is attached to this GitHub Actions run.
          `;
          await writeFile(`${directory}/comment.md`, body.replace(/^          /gm, ''), 'utf8');
          NODE

      - name: Upload sanitized Cloudflare diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-build-diagnostics-${{ github.sha }}
          path: .cloudflare-build-diagnostics/
          if-no-files-found: warn
          retention-days: 14

      - name: Post or update Cloudflare build report
        if: always() && steps.monitor.outputs.exit_code != ''
        shell: bash
        env:
          CLOUDFLARE_WORKER_NAME: ${{ steps.resolve.outputs.worker_name }}
          MONITOR_EXIT_CODE: ${{ steps.monitor.outputs.exit_code }}
        run: |
          report_file=".cloudflare-build-diagnostics/comment.md"
          if [ ! -f "$report_file" ]; then
            echo "Cloudflare report was not generated."
            exit 0
          fi

          marker="<!-- cloudflare-build-diagnostics:${CLOUDFLARE_WORKER_NAME} -->"
          pr_number="$(gh api "repos/$GITHUB_REPOSITORY/commits/$TARGET_SHA/pulls" \
            -H 'Accept: application/vnd.github+json' \
            --jq 'map(select(.state == "open"))[0].number // empty')"

          if [ -n "$pr_number" ]; then
            comment_id="$(gh api --paginate "repos/$GITHUB_REPOSITORY/issues/$pr_number/comments?per_page=100" \
              --jq ".[] | select(.body | contains(\"$marker\")) | .id" | tail -n 1)"
            if [ -n "$comment_id" ]; then
              gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" \
                -f body="$(cat "$report_file")" >/dev/null
            else
              gh pr comment "$pr_number" --body-file "$report_file"
            fi
          elif [ "$MONITOR_EXIT_CODE" != "0" ]; then
            title="Cloudflare build failed: ${CLOUDFLARE_WORKER_NAME} ${TARGET_SHA:0:12}"
            issue_number="$(gh issue list --state open --limit 100 --json number,title \
              --jq ".[] | select(.title == \"$title\") | .number" | head -n 1)"
            if [ -n "$issue_number" ]; then
              gh issue comment "$issue_number" --body-file "$report_file"
            else
              gh issue create --title "$title" --body-file "$report_file"
            fi
          fi

      - name: Fail the diagnostic check
        if: steps.monitor.outputs.exit_code != '0'
        shell: bash
        run: exit "${{ steps.monitor.outputs.exit_code }}"
