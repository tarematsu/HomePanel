name: HomePanel unified Worker CI

on:
  pull_request:
    paths:
      - 'cloud/**'
      - 'video/src/**'
      - 'video/public/**'
      - 'video/package.json'
      - '.github/scripts/audit-cloudflare-daily-usage.py'
      - '.github/scripts/audit-cloudflare-telemetry.py'
      - '.github/scripts/query-cloudflare-d1-insights.mjs'
      - '.github/scripts/publish-homepanel-observability-status.mjs'
      - '.github/workflows/cloud-deploy.yml'
      - '.github/workflows/fetch-cloudflare-observability.yml'
      - '.github/workflows/homepanel-unified-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'cloud/**'
      - 'video/src/**'
      - 'video/public/**'
      - 'video/package.json'
      - '.github/scripts/audit-cloudflare-daily-usage.py'
      - '.github/scripts/audit-cloudflare-telemetry.py'
      - '.github/scripts/query-cloudflare-d1-insights.mjs'
      - '.github/scripts/publish-homepanel-observability-status.mjs'
      - '.github/workflows/cloud-deploy.yml'
      - '.github/workflows/fetch-cloudflare-observability.yml'
      - '.github/workflows/homepanel-unified-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homepanel-unified-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Validate Cloudflare observability policies
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/audit-cloudflare-daily-usage.py --self-test
          python3 .github/scripts/audit-cloudflare-telemetry.py --self-test
          node .github/scripts/query-cloudflare-d1-insights.mjs --self-test
          node .github/scripts/publish-homepanel-observability-status.mjs --self-test
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/fetch-cloudflare-observability.yml').read_text()
          daily = Path('.github/scripts/audit-cloudflare-daily-usage.py').read_text()
          telemetry = Path('.github/scripts/audit-cloudflare-telemetry.py').read_text()
          insights = Path('.github/scripts/query-cloudflare-d1-insights.mjs').read_text()
          publisher = Path('.github/scripts/publish-homepanel-observability-status.mjs').read_text()
          unified_worker = Path('cloud/src/unified_worker.js').read_text()
          worker_entry = Path('cloud/src/worker_entry.ts').read_text()
          worker_core = Path('cloud/src/worker_core.ts').read_text()
          device_sync = Path('cloud/src/device_sync.ts').read_text()
          scheduler = Path('cloud/src/scheduler.ts').read_text()
          scheduler_runtime = Path('cloud/src/scheduler_runtime.ts').read_text()
          octopus_history = Path('cloud/src/octopus_history.ts').read_text()
          status_report = Path('video/src/status-report.js').read_text()
          status_lists = Path('video/src/status-lists.js').read_text()
          liveness = Path('video/src/liveness-monitor.js').read_text()
          migration = Path('cloud/migrations/202607230500_d1_read_hotspots.sql').read_text()
          runtime_migration = Path('cloud/migrations/202607240200_d1_runtime_reduction.sql').read_text()
          radar_source = Path('cloud/src/radar_source.ts').read_text()
          radar_cache = Path('cloud/src/radar_bundle_cache.ts').read_text()
          required_workflow = (
              'workflows: ["Deploy unified homepanel-cloud Worker"]',
              'cron: "47 2 * * *"',
              'issues: write',
              'statuses: write',
              'D1_CONFIG_GLOBS: cloud/wrangler.jsonc',
              'D1_DATABASE_NAME: homepanel-data',
              'DAILY_REQUEST_BUDGET: "3000"',
              'DAILY_REQUEST_RESERVE: "0"',
              'DAILY_D1_READ_BUDGET: "50000"',
              'DAILY_D1_WRITE_BUDGET: "3000"',
              'DAILY_QUEUE_BUDGET: "1000"',
              'Enforce projected UTC daily Worker, D1, and Queue budgets',
              'Collect top D1 queries by rows read',
              'query-cloudflare-d1-insights.mjs',
              'D1_INSIGHTS_OUTCOME',
              'id: observability-query',
              'LIVE_TAIL_SECONDS: "90"',
              'LIVE_TAIL_LOG: live-tail.log',
              'telemetry-summary.md',
              'Publish persistent observability status',
              'publish-homepanel-observability-status.mjs',
              'steps.publish-status.outcome',
              'if: always()',
              'set -o pipefail',
              'retention-days: 1',
          )
          required_daily = (
              'queueMessageOperationsAdaptiveGroups',
              'billableOperations',
              'linear-from-utc-midnight',
              'project_daily_usage',
              'queueOperations',
              'Actual to now',
              'Projected 24h',
          )
          required_insights = (
              'wrangler',
              'd1',
              'insights',
              '--sort-by',
              'reads',
              'totalRowsRead',
              'sanitizeQuery',
              'SQL fingerprint',
              'redactText',
          )
          required_telemetry = (
              'scriptVersion',
              'fromisoformat',
              'old_version_invocations_excluded',
              'LIVE_TAIL_EVENT=',
              'missing_workers',
              'DURABLE_OBJECT_CPU_BUDGET_MS',
          )
          required_publisher = (
              'HomePanel Observability Status',
              '<!-- homepanel-observability-status -->',
              'MAX_SECTION_CHARS = 12_000',
              'MAX_ISSUE_BODY_CHARS = 60_000',
              'observability/d1-query-insights',
              'observability/overall',
              'Top D1 queries by rows read',
              'upsertStatusIssue',
              "statusState('skipped'), 'failure'",
              "statusState('unknown'), 'failure'",
              "overallOutcome({ a: 'success', b: 'skipped' }), 'failure'",
              'Bearer [redacted]',
          )
          for marker in required_workflow:
              assert marker in workflow, marker
          for marker in required_daily:
              assert marker in daily, marker
          for marker in required_insights:
              assert marker in insights, marker
          for marker in required_telemetry:
              assert marker in telemetry, marker
          for marker in required_publisher:
              assert marker in publisher, marker
          assert "async scheduled(_controller, env, ctx)" in unified_worker
          assert "queueSchedulerWatchdog(env, ctx)" in unified_worker
          assert "runSchedulerTick" not in unified_worker
          assert "await prewarmRadarBundle(env, payload" in radar_source
          assert "cache.match(cacheKey)" in radar_cache
          assert "bucket.get(R2_LATEST_BUNDLE_KEY)" in radar_cache
          assert 'legacy-telemetry-endpoint-used' not in worker_entry
          assert 'receiveTelemetryOptimized' not in worker_entry
          assert 'legacy-telemetry-endpoint-used' not in worker_core
          assert 'receiveTelemetryOptimized' not in worker_core
          assert 'FROM sync_manifest AS manifest' in device_sync
          assert ').first<DeviceSyncSnapshotRow>()' in device_sync
          assert 'RUNTIME_STORAGE_KEY' in scheduler_runtime
          assert 'state.storage.put(RUNTIME_STORAGE_KEY' in scheduler_runtime
          assert 'INSERT INTO job_events' in scheduler_runtime
          assert 'refreshStatusCounts(env.DB' in scheduler
          assert 'SYSTEM_JOBS_CACHE_MS = 60 * 60_000' in scheduler
          assert 'octopus_daily_totals' in octopus_history
          assert 'readDailyRange' in octopus_history
          assert 'status-counts-stale-deferred-to-cleanup' in status_report
          assert 'refreshStatusCounts' not in status_report
          assert 'refreshStatusCounts' not in status_lists
          assert 'daily-cleanup' in status_lists
          assert 'video_liveness_bounds' in liveness
          assert 'MAX(video.id)' not in liveness
          assert 'LIVENESS_BATCH_SIZE = 5' in liveness
          assert "video.status = 'active'" in liveness
          assert 'CREATE TABLE IF NOT EXISTS octopus_daily_totals' in migration
          assert 'CREATE VIEW IF NOT EXISTS video_liveness_bounds' in migration
          assert 'sqlite_sequence' in migration
          assert 'video_liveness_bound_on_insert' not in migration
          assert 'CREATE TABLE sync_manifest' in runtime_migration
          assert 'CREATE TABLE job_events' in runtime_migration
          assert 'WITHOUT ROWID' in runtime_migration
          assert 'DROP TABLE IF EXISTS environment_samples' in runtime_migration
          assert 'DROP TABLE IF EXISTS environment_buckets' in runtime_migration
          assert 'status_counts_on_video_update' in runtime_migration
          assert 'status_counts_on_ranking_insert' in runtime_migration
          assert 'dirty=0' in runtime_migration
          assert workflow.count('cron: "') == 1
          assert 'cron: "23 * * * *"' not in workflow
          assert 'actions: read' not in workflow
          assert 'Determine whether upstream run deployed the Worker' not in workflow
          assert 'steps.deployment.outputs' not in workflow
          assert 'Report deferred post-deployment runtime audit' not in workflow
          assert 'Start deep audit window' not in workflow
          assert 'AUDIT_FROM=' not in workflow
          assert '\n  pull_request:' not in workflow
          assert '\n  push:' in workflow
          assert 'branches: [main]' in workflow
          assert '.github/scripts/publish-homepanel-observability-status.mjs' in workflow
          assert 'R2_BUCKET' not in workflow + telemetry
          print('observability and D1 read policy check passed')
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            cloud/package-lock.json
            video/package.json
      - name: Install HomePanel dependencies
        working-directory: cloud
        run: npm ci --no-audit --no-fund
      - name: Install video runtime dependencies
        working-directory: video
        run: npm install --no-audit --no-fund
      - name: Check HomePanel sources
        working-directory: cloud
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee source-check.log
          node_modules/.bin/wrangler d1 insights --help | grep -q -- '--time-period'
          node_modules/.bin/wrangler d1 insights --help | grep -q -- '--sort-by'
          node_modules/.bin/wrangler d1 insights --help | grep -q -- '--json'
      - name: Run HomePanel tests
        working-directory: cloud
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log
      - name: Build the unified Worker
        working-directory: cloud
        run: npm run check:unified-bundle
      - name: Verify local unified D1 migrations
        working-directory: cloud
        shell: bash
        run: |
          set -o pipefail
          {
            rm -rf .wrangler-ci-state
            npx wrangler d1 migrations apply homepanel-data --local --persist-to .wrangler-ci-state --config wrangler.jsonc
            npx wrangler d1 execute homepanel-data --local --persist-to .wrangler-ci-state --config wrangler.jsonc --command "PRAGMA foreign_key_check;"
            npx wrangler d1 execute homepanel-data --local --persist-to .wrangler-ci-state --config wrangler.jsonc --command "SELECT COUNT(*) AS schema_object_count FROM sqlite_schema WHERE type IN ('table','index','trigger','view') AND name NOT LIKE 'sqlite_%' AND name NOT LIKE '_cf_%';"
          } 2>&1 | tee d1-validation.log
      - name: Upload failed validation output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: homepanel-unified-validation-output-${{ github.run_id }}
          path: |
            cloud/source-check.log
            cloud/test.log
            cloud/d1-validation.log
          if-no-files-found: warn
          retention-days: 7
