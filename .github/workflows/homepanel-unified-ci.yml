name: HomePanel unified Worker CI

on:
  pull_request:
    paths:
      - 'cloud/**'
      - 'video/src/**'
      - 'video/public/**'
      - 'video/package.json'
      - '.github/workflows/homepanel-unified-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'cloud/**'
      - 'video/src/**'
      - 'video/public/**'
      - 'video/package.json'
      - '.github/workflows/homepanel-unified-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homepanel-unified-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            cloud/package-lock.json
            video/package.json
      - name: Install HomePanel dependencies
        working-directory: cloud
        run: npm ci --no-audit --no-fund
      - name: Install video runtime dependencies
        working-directory: video
        run: npm install --no-audit --no-fund
      - name: Check HomePanel sources
        working-directory: cloud
        run: npm run check
      - name: Run HomePanel tests
        working-directory: cloud
        run: npm test
      - name: Build the unified Worker
        working-directory: cloud
        run: npm run check:unified-bundle
      - name: Verify local unified D1 migrations
        working-directory: cloud
        shell: bash
        run: |
          set -o pipefail
          {
            rm -rf .wrangler-ci-state
            npx wrangler d1 migrations apply homepanel-data --local --persist-to .wrangler-ci-state --config wrangler.jsonc
            npx wrangler d1 execute homepanel-data --local --persist-to .wrangler-ci-state --config wrangler.jsonc --command "PRAGMA foreign_key_check;"
            npx wrangler d1 execute homepanel-data --local --persist-to .wrangler-ci-state --config wrangler.jsonc --command "SELECT COUNT(*) AS schema_object_count FROM sqlite_schema WHERE type IN ('table','index','trigger') AND name NOT LIKE 'sqlite_%' AND name NOT LIKE '_cf_%';"
          } 2>&1 | tee d1-validation.log
      - name: Upload failed D1 validation output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: homepanel-unified-d1-output-${{ github.run_id }}
          path: cloud/d1-validation.log
          if-no-files-found: warn
          retention-days: 7
