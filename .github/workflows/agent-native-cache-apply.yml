name: Apply native panel cache optimizations

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/agent-native-cache-apply.yml"

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply native cache patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old[:100]!r}')
              target.write_text(text.replace(old, new), encoding='utf-8', newline='')

          def replace_regex(path: str, pattern: str, replacement: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'{path}: regex expected one match, found {count}: {pattern[:100]!r}')
              target.write_text(updated, encoding='utf-8', newline='')

