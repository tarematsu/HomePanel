name: Ops disable Cloudflare Git builds

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-disable-cloudflare-git-builds.yml

permissions:
  contents: read

jobs:
  disconnect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      CLOUDFLARE_BUILDS_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_BUILDS_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      TARGET_PROVIDER_ACCOUNT: tarematsu
      TARGET_REPOSITORY: HP

    steps:
      - name: Disconnect repository and delete Workers Builds triggers
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_BUILDS_API_TOKEN"
          node --input-type=module <<'NODE'
          const token = String(process.env.CLOUDFLARE_BUILDS_API_TOKEN || '').trim();
          let accountId = String(process.env.CLOUDFLARE_ACCOUNT_ID || '').trim();
          const providerAccount = String(process.env.TARGET_PROVIDER_ACCOUNT || '').trim().toLowerCase();
          const repositoryName = String(process.env.TARGET_REPOSITORY || '').trim().toLowerCase();
          const base = 'https://api.cloudflare.com/client/v4';

          async function request(path, init = {}) {
            const response = await fetch(`${base}${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: 'application/json',
                ...(init.headers || {}),
              },
            });
            const text = await response.text();
            let payload = {};
            try { payload = text ? JSON.parse(text) : {}; } catch {}
            if (!response.ok || payload?.success === false) {
              const errors = Array.isArray(payload?.errors)
                ? payload.errors.map((error) => `${error?.code || 'error'}: ${error?.message || 'unknown error'}`).join('; ')
                : text.slice(0, 500);
              throw new Error(`${init.method || 'GET'} ${path} failed (${response.status}): ${errors || 'unknown error'}`);
            }
            return payload;
          }

          if (!accountId) {
            const accounts = await request('/accounts?page=1&per_page=100');
            const rows = Array.isArray(accounts?.result) ? accounts.result : [];
            if (rows.length !== 1 || !rows[0]?.id) {
              throw new Error('Cloudflare account could not be inferred uniquely');
            }
            accountId = String(rows[0].id);
          }

          const scriptsPayload = await request(`/accounts/${encodeURIComponent(accountId)}/workers/scripts`);
          const scripts = Array.isArray(scriptsPayload?.result) ? scriptsPayload.result : [];
          const matchedTriggers = [];
          const connectionIds = new Set();

          for (const script of scripts) {
            const tag = String(script?.tag || '').trim();
            if (!tag) continue;
            const payload = await request(`/accounts/${encodeURIComponent(accountId)}/builds/workers/${encodeURIComponent(tag)}/triggers`);
            for (const trigger of Array.isArray(payload?.result) ? payload.result : []) {
              const connection = trigger?.repo_connection || {};
              const accountMatches = String(connection?.provider_account_name || '').trim().toLowerCase() === providerAccount;
              const repoMatches = String(connection?.repo_name || '').trim().toLowerCase() === repositoryName;
              if (!accountMatches || !repoMatches) continue;
              const triggerUuid = String(trigger?.trigger_uuid || '').trim();
              if (!triggerUuid) throw new Error(`Matched trigger for ${script?.id || tag} has no UUID`);
              matchedTriggers.push({ worker: String(script?.id || tag), triggerUuid, name: String(trigger?.trigger_name || '') });
              const connectionUuid = String(connection?.repo_connection_uuid || '').trim();
              if (connectionUuid) connectionIds.add(connectionUuid);
            }
          }

          for (const trigger of matchedTriggers) {
            await request(`/accounts/${encodeURIComponent(accountId)}/builds/triggers/${encodeURIComponent(trigger.triggerUuid)}`, {
              method: 'DELETE',
            });
            console.log(`Deleted Cloudflare Builds trigger: ${trigger.worker} / ${trigger.name || trigger.triggerUuid}`);
          }

          for (const connectionUuid of connectionIds) {
            await request(`/accounts/${encodeURIComponent(accountId)}/builds/repos/connections/${encodeURIComponent(connectionUuid)}`, {
              method: 'DELETE',
            });
            console.log(`Deleted Cloudflare repository connection: ${connectionUuid}`);
          }

          const leftovers = [];
          for (const script of scripts) {
            const tag = String(script?.tag || '').trim();
            if (!tag) continue;
            const payload = await request(`/accounts/${encodeURIComponent(accountId)}/builds/workers/${encodeURIComponent(tag)}/triggers`);
            for (const trigger of Array.isArray(payload?.result) ? payload.result : []) {
              const connection = trigger?.repo_connection || {};
              if (
                String(connection?.provider_account_name || '').trim().toLowerCase() === providerAccount
                && String(connection?.repo_name || '').trim().toLowerCase() === repositoryName
              ) {
                leftovers.push(`${script?.id || tag}:${trigger?.trigger_uuid || 'unknown'}`);
              }
            }
          }
          if (leftovers.length) throw new Error(`Cloudflare Git triggers remain: ${leftovers.join(', ')}`);

          console.log(JSON.stringify({
            accountId,
            repository: `${providerAccount}/${repositoryName}`,
            deletedTriggerCount: matchedTriggers.length,
            deletedConnectionCount: connectionIds.size,
            verified: true,
          }, null, 2));
          NODE
