<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://data.homepanel; img-src 'self' https://data.homepanel https://homepanel-cloud.example.invalid https: data:; style-src 'self'; script-src 'self'; connect-src 'self' https://homepanel-cloud.example.invalid https://www.jma.go.jp https://skrzk.pages.dev">
  <title>HomePanel</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="air-history.css">
  <link rel="stylesheet" href="performance.css">
  <link rel="stylesheet" href="ui-overrides.css">
  <link rel="stylesheet" href="sh-audio-controls.css">
  <link rel="stylesheet" href="wallpaper.css">
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="i-newspaper" viewBox="0 0 24 24"><path d="M15 18h-5"/><path d="M18 14h-8"/><path d="M18 10h-8"/><path d="M7 8v8"/><path d="M21 18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a1 1 0 0 1 1-1h15a2 2 0 0 1 2 2z"/></symbol>
    <symbol id="i-air" viewBox="0 0 24 24"><path d="M3 8h11a4 4 0 1 0-4-4"/><path d="M3 12h15a3 3 0 1 1-3 3"/><path d="M3 16h9a2 2 0 1 1-2 2"/></symbol>
    <symbol id="i-cloud-rain" viewBox="0 0 24 24"><path d="M16 13a4 4 0 0 0 0-8 5 5 0 0 0-9.7 1.5A4 4 0 0 0 7 14"/><path d="M8 19v1"/><path d="M8 14v1"/><path d="M16 19v1"/><path d="M16 14v1"/><path d="M12 21v1"/><path d="M12 16v1"/></symbol>
    <symbol id="i-radio" viewBox="0 0 24 24"><path d="M4.9 19a10 10 0 0 1 0-14.1"/><path d="M7.8 16.2a6 6 0 1 1 0-8.5"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8a6 6 0 0 1 0 8.4"/><path d="M19.1 4.9a10 10 0 0 1 0 14.1"/></symbol>
    <symbol id="i-bot" viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></symbol>
    <symbol id="i-bolt" viewBox="0 0 24 24"><path d="M13 2 4 14h7l-1 8 9-12h-7z"/></symbol>
    <symbol id="i-radar" viewBox="0 0 24 24"><path d="M19.07 4.93A10 10 0 1 0 21 12h-9"/><path d="M21 3 12 12"/><path d="M17 3h4v4"/></symbol>
    <symbol id="i-settings" viewBox="0 0 24 24"><path d="M12 3v2"/><path d="M12 19v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M3 12h2"/><path d="M19 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/><circle cx="12" cy="12" r="4"/></symbol>
    <symbol id="i-monitor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M12 16v4"/><path d="M8 20h8"/></symbol>
    <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></symbol>
    <symbol id="i-download" viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></symbol>
    <symbol id="i-power" viewBox="0 0 24 24"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.8 0"/></symbol>
    <symbol id="i-thermometer" viewBox="0 0 24 24"><path d="M14 14.76V3.5a2 2 0 0 0-4 0v11.26a4 4 0 1 0 4 0z"/></symbol>
    <symbol id="i-droplets" viewBox="0 0 24 24"><path d="M7 16a5 5 0 0 0 10 0c0-3-5-9-5-9s-5 6-5 9z"/><path d="M12 3v2"/></symbol>
  </svg>

  <main class="dashboard" aria-label="HomePanel dashboard">
    <section class="panel air" data-panel="air">
      <header>
        <span class="panel-heading"><svg class="icon"><use href="#i-air"></use></svg><span id="weather-title"></span></span>
        <span id="air-label" class="subtle"></span>
      </header>
      <div class="metric-row air-metrics">
        <div class="co2-card"><small>CO2</small><b><span id="co2-value">---</span><em>ppm</em></b></div>
        <div><small id="temperature-label"></small><b id="temperature">--.-&#8451;</b></div>
        <div><small id="humidity-label"></small><b id="humidity">--%</b></div>
      </div>
      <div class="air-history air-history-single" aria-label="CO2、温度、湿度の24時間推移">
        <div class="air-legend">
          <span class="air-trend-label" data-metric="co2"><svg class="mini-icon"><use href="#i-air"></use></svg>CO2</span><span id="co2-trend-range" class="air-trend-range">--</span>
          <span class="air-trend-label" data-metric="temperature"><svg class="mini-icon"><use href="#i-thermometer"></use></svg>温度</span><span id="temperature-trend-range" class="air-trend-range">--</span>
          <span class="air-trend-label" data-metric="humidity"><svg class="mini-icon"><use href="#i-droplets"></use></svg>湿度</span><span id="humidity-trend-range" class="air-trend-range">--</span>
        </div>
        <canvas id="air-history-chart" class="trend-chart trend-chart-large" aria-label="Air history trend"></canvas>
      </div>
      <div class="air-history-axis"><span id="air-history-start">--:--</span><span id="air-history-end">--:--</span></div>
    </section>

    <section class="panel switchbot spotify-panel" data-panel="spotify">
      <header>
        <span class="panel-heading"><svg class="icon"><use href="#i-radio"></use></svg><span id="switchbot-title"></span></span>
      </header>
      <div class="stationhead-dual-list">
        <article class="stationhead-player-row" aria-label="SHウインドウA">
          <div class="stationhead-window-label">SHウインドウA</div>
          <section class="stationhead-compact spotify-now">
            <div class="stationhead-compact-media">
              <img id="stationhead-a-artwork" alt="" hidden>
              <div id="stationhead-a-artwork-fallback" class="stationhead-artwork-fallback"></div>
            </div>
            <div class="stationhead-compact-body">
              <div class="stationhead-track clamp" id="stationhead-a-track">--</div>
              <div class="stationhead-artist clamp" id="stationhead-a-artist">--</div>
              <div class="sp-live-row"><span id="stationhead-a-live-badge" class="sp-live-badge offline">OFFLINE</span><span id="stationhead-a-live-text" class="sp-live-text">情報待ち</span></div>
              <div class="stationhead-audio-controls" data-window="a">
                <button type="button" id="stationhead-a-audio" class="stationhead-audio-toggle" data-audio-window="a" data-action="stationhead-audio-a" aria-pressed="false"><span>音声ON</span></button>
              </div>
            </div>
          </section>
        </article>
        <article class="stationhead-player-row" aria-label="SHウインドウB">
          <div class="stationhead-window-label">SHウインドウB</div>
          <section class="stationhead-compact spotify-now">
            <div id="stationhead-b-artwork-shell" class="stationhead-compact-media">
              <img id="stationhead-b-artwork" alt="" hidden>
              <div id="stationhead-b-artwork-fallback" class="stationhead-artwork-fallback"></div>
              <div id="stationhead-b-artwork-wait" class="stationhead-artwork-wait" aria-label="次の曲を待機中" hidden>
                <span class="stationhead-artwork-spinner" aria-hidden="true"></span>
              </div>
            </div>
            <div class="stationhead-compact-body">
              <div class="stationhead-track clamp" id="stationhead-b-track">--</div>
              <div class="stationhead-artist clamp" id="stationhead-b-artist">--</div>
              <div class="sp-live-row"><span id="stationhead-b-live-badge" class="sp-live-badge offline">OFFLINE</span><span id="stationhead-b-live-text" class="sp-live-text">API情報待ち</span></div>
              <div class="stationhead-audio-controls" data-window="b">
                <button type="button" id="stationhead-b-audio" class="stationhead-audio-toggle" data-audio-window="b" data-action="stationhead-audio-b" aria-pressed="false"><span>音声ON</span></button>
              </div>
            </div>
          </section>
        </article>
      </div>
    </section>

    <section class="panel clock-weather" data-panel="clock-weather">
      <article class="headline-card" id="headline-card" aria-label="最新ニュース"><h3 id="headline-title">--</h3><p id="headline-detail"></p></article>
      <div class="clock-center"><div class="date" id="date">----</div><div class="clock" id="clock">--:--:--</div></div>
      <div id="weather-hours" class="weather-hours"></div>
    </section>

    <section class="panel radar" data-panel="radar">
      <header><span class="panel-heading"><svg class="icon"><use href="#i-radar"></use></svg><span id="radar-title"></span></span><time id="radar-time">--:--</time></header>
      <div class="radar-stage"><canvas id="radar-canvas" width="800" height="520"></canvas></div>
    </section>

    <section class="panel energy" data-panel="energy">
      <header><span class="panel-heading"><svg class="icon"><use href="#i-bolt"></use></svg><span id="energy-title"></span></span><span id="energy-status" class="subtle"></span></header>
      <div class="energy-summary">
        <div><small>先月</small><strong id="last-month">--</strong><span>kWh</span><span class="energy-cost" id="last-month-cost"></span></div>
        <div><small>今月見込み</small><strong id="projected">--</strong><span>kWh</span><span class="energy-cost" id="projected-cost"></span></div>
      </div>
      <div class="energy-chart-shell"><canvas id="energy-chart" class="energy-chart-canvas" aria-label="Energy chart"></canvas></div>
      <div id="energy-plugs" class="energy-plugs" aria-label="Plug Mini status"><div class="plug-empty">Plug Miniを取得中</div></div>
    </section>

    <section class="panel controls" data-panel="controls">
      <header><span class="panel-heading"><svg class="icon"><use href="#i-settings"></use></svg><span id="controls-title"></span></span><span class="subtle" id="controls-status"></span></header>
      <div class="control-grid">
        <button data-action="app-update" id="app-update"><svg class="mini-icon"><use href="#i-download"></use></svg><span></span></button>
        <button data-action="restart" id="restart"><svg class="mini-icon"><use href="#i-power"></use></svg><span></span></button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
  <script src="homepanel-core.js"></script>
  <script src="homepanel-clock.js"></script>
  <script src="homepanel-news.js"></script>
  <script src="homepanel-weather.js"></script>
  <script src="homepanel-energy.js"></script>
  <script src="homepanel-switchbot.js"></script>
  <script src="homepanel-sh.js"></script>
  <script src="spotify-panel-runtime.js"></script>
  <script src="homepanel-air.js"></script>
  <script src="homepanel-radar.js"></script>
  <script src="homepanel-runtime.js"></script>
  <script src="app.js"></script>
  <script src="radar-monochrome.js"></script>
  <script src="air-history.js"></script>
</body>
</html>
